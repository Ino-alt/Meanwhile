default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: meanwhile_development

test:
  <<: *default
  database: meanwhile_test

production:
  primary: &primary_production
    <<: *default
    database: meanwhile_production
  cache:
    <<: *primary_production
    database: meanwhile_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: meanwhile_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: meanwhile_production_cable
    migrations_paths: db/cable_migrate
